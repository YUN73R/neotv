# .github/workflows/android-tv-debug.yml

name: Android TV Debug Build (No Signing)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # Expo TV Prebuild
      - name: Expo Prebuild TV
        env:
          EXPO_TV: 1
        run: |
          npx expo prebuild --clean --platform android

      # 关键：防止 expo-updates + KSP Metaspace 崩溃
      - name: Fix Gradle Memory
        run: |
          cd android

          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "kotlin.daemon.jvm.options=-Xmx3g" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties

      # Debug build（不签名）
      - name: Build Debug APK
        run: |
          cd android

          export GRADLE_OPTS="-Xmx6g -XX:MaxMetaspaceSize=2g"
          export _JAVA_OPTIONS="-Xmx6g -XX:MaxMetaspaceSize=2g"

          chmod +x gradlew

          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      # 输出 APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      # 构建失败日志（可选）
      - name: Upload Gradle Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            android/**/build/reports/**
            android/**/build/logs/**
