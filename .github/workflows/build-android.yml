name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android TV
        run: npm run prebuild:tv
        env:
          EXPO_TV: 1

      # 🔥 关键修复（必须加）
      - name: Fix Gradle + KSP Memory
        run: |
          cd android
          
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "kotlin.daemon.jvm.options=-Xmx3g" >> gradle.properties
          echo "expo.updates.useKsp=false" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"
          _JAVA_OPTIONS: "-Xmx6g -XX:MaxMetaspaceSize=2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/
