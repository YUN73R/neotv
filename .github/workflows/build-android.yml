name: Android TV Release

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android-keystore.jks

      - name: Generate TV Native Project
        env:
          EXPO_TV: 1
        run: |
          npx expo prebuild --clean --platform android

      - name: Configure Signing
        run: |

          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=../../android-keystore.jks
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Patch app/build.gradle
        run: |

          sed -i '/android {/a\
          signingConfigs {\
              release {\
                  storeFile file(MYAPP_UPLOAD_STORE_FILE)\
                  storePassword MYAPP_UPLOAD_STORE_PASSWORD\
                  keyAlias MYAPP_UPLOAD_KEY_ALIAS\
                  keyPassword MYAPP_UPLOAD_KEY_PASSWORD\
              }\
          }\
          buildTypes {\
              release {\
                  signingConfig signingConfigs.release\
              }\
          }' \
          android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: |
            android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab