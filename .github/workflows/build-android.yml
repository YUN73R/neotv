name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Prebuild
        run: EXPO_TV=1 npx expo prebuild --clean --platform android

      - name: Patch expo-updates
        run: |
          cd android
          echo "expo.updates.useKsp=false" >> gradle.properties

      - name: Build
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/
