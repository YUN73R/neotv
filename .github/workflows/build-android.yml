name: Android TV Debug Build (FIXED)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Expo prebuild TV
        env:
          EXPO_TV: 1
        run: npx expo prebuild --clean --platform android

      # 🔥 核心修复（关键在这里）
      - name: Fix expo-updates + Gradle
        run: |
          cd android

          echo "expo.updates.useKsp=false" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "kotlin.daemon.jvm.options=-Xmx2g" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      # 构建 debug APK（最稳定）
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew

          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tv-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
